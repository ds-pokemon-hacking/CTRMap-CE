name: Build CTRMap-CE

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Set build metadata
        id: meta
        run: |
          DATE=$(date -u +'%Y%m%d')
          COMMIT=${GITHUB_SHA::7}
          if [[ "$GITHUB_REF" == "refs/heads/main" || "$GITHUB_REF" == "refs/heads/master" ]]; then
            TYPE=stable
          else
            TYPE=nightly
          fi
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "type=$TYPE" >> $GITHUB_OUTPUT

      - name: Build and install XStandard
        run: bash ci/build/01-build-xstandard.sh

      - name: Build and publish RSyntaxTextArea
        run: bash ci/build/02-build-rsyntaxtextarea.sh

      - name: Build and install PokeScript
        run: bash ci/build/03-build-pokescript.sh

      - name: Build and install RPMAuthoringTools
        run: bash ci/build/04-build-rpm-authoring-tools.sh

      - name: Install CTRMap-CE
        run: bash ci/build/05-install-ctrmap-ce.sh

      - name: Build with Maven
        env:
          BUILD_DATE: ${{ steps.meta.outputs.date }}
          BUILD_COMMIT: ${{ steps.meta.outputs.commit }}
          BUILD_TYPE: ${{ steps.meta.outputs.type }}
        run: bash ci/build/06-package-ctrmap-ce.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CTRMap-CE
          path: target/ctrmap-ce-*-jar-with-dependencies.jar
          if-no-files-found: warn
