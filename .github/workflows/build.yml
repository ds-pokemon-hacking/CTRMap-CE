name: Build CTRMap-CE

on:
  push:
    branches: [main, master, maven]
  pull_request:
    branches: [main, master, maven]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn install -B

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CTRMap-CE
          path: ctrmap-ce/target/ctrmap-ce-*.jar
          if-no-files-found: warn

      - name: Create Nightly Release
        if: github.event_name == 'push' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --yes 2>/dev/null || true
          git push origin :refs/tags/nightly 2>/dev/null || true
          gh release create nightly \
            --title "Nightly Build" \
            --notes "Automated nightly build from ${GITHUB_SHA::7} on $(date -u +'%Y-%m-%d %H:%M:%S UTC')" \
            --prerelease \
            ctrmap-ce/target/ctrmap-ce-*.jar

      - name: Create Stable Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="stable-$(date -u +'%Y%m%d-%H%M%S')"
          gh release create "$TAG" \
            --title "Stable $(date -u +'%Y-%m-%d %H:%M:%S UTC')" \
            --notes "Stable release from ${GITHUB_SHA::7}" \
            ctrmap-ce/target/ctrmap-ce-*.jar
