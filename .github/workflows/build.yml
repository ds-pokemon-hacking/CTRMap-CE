name: Build CTRMap-CE

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Set build metadata
        id: meta
        run: |
          DATE=$(date -u +'%Y%m%d')
          COMMIT=${GITHUB_SHA::7}
          if [[ "$GITHUB_REF" == "refs/heads/main" || "$GITHUB_REF" == "refs/heads/master" ]]; then
            TYPE=stable
          else
            TYPE=nightly
          fi
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "type=$TYPE" >> $GITHUB_OUTPUT

      - name: Build and install XStandard
        working-directory: submodules/XStandard
        run: |
          cd lib
          chmod +x _InstallLibs.sh
          ./_InstallLibs.sh
          cd ..
          mvn install -B

      - name: Build and publish RSyntaxTextArea
        working-directory: submodules/PokeScript/PokeScriptIDE/submodules/RSyntaxTextArea
        run: |
          chmod +x ./gradlew
          ./gradlew jar publishToMavenLocal --no-daemon

      - name: Build and install PokeScript
        working-directory: submodules/PokeScript
        run: mvn install -B

      - name: Build and install RPMAuthoringTools
        working-directory: submodules/RPMAuthoringTools
        run: mvn install -B

      - name: Build with Maven
        run: mvn package assembly:single -B -Dbuild.date=${{ steps.meta.outputs.date }} -Dbuild.commit=${{ steps.meta.outputs.commit }} -Dbuild.type=${{ steps.meta.outputs.type }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CTRMap-CE
          path: target/ctrmap-ce-*-jar-with-dependencies.jar
          if-no-files-found: warn
