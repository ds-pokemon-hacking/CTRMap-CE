name: Build CTRMap-CE

on:
  push:
    branches: [main, master, maven]
  pull_request:
    branches: [main, master, maven]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Set build metadata
        id: meta
        run: |
          DATE=$(date -u +'%Y%m%d')
          COMMIT=${GITHUB_SHA::7}
          if [[ "$GITHUB_REF" == "refs/heads/main" || "$GITHUB_REF" == "refs/heads/master" ]]; then
            TYPE=stable
          else
            TYPE=nightly
          fi
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "type=$TYPE" >> $GITHUB_OUTPUT

      - name: Build with Maven
        run: mvn install -B -Dbuild.date=${{ steps.meta.outputs.date }} -Dbuild.commit=${{ steps.meta.outputs.commit }} -Dbuild.type=${{ steps.meta.outputs.type }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CTRMap-CE
          path: ctrmap-ce/target/ctrmap-ce-*.jar
          if-no-files-found: warn

      - name: Create Nightly Release
        if: github.event_name == 'push' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --yes 2>/dev/null || true
          git push origin :refs/tags/nightly 2>/dev/null || true
          gh release create nightly \
            --title "Nightly ${{ steps.meta.outputs.date }} (${{ steps.meta.outputs.commit }})" \
            --notes "Dev build from \`${{ steps.meta.outputs.commit }}\` on $(date -u +'%Y-%m-%d %H:%M:%S UTC')" \
            --prerelease \
            ctrmap-ce/target/ctrmap-ce-*.jar

      - name: Create Stable Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="stable-${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.commit }}"
          gh release create "$TAG" \
            --title "Stable ${{ steps.meta.outputs.date }} (${{ steps.meta.outputs.commit }})" \
            --notes "Stable release from \`${{ steps.meta.outputs.commit }}\` on $(date -u +'%Y-%m-%d %H:%M:%S UTC')" \
            ctrmap-ce/target/ctrmap-ce-*.jar
